<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Ionic App</title>

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>

<body>
  <app-root>
    <div id="web-splash">
      <div class="splash-spinner"></div>
    </div>
    <style>
      #web-splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #0F0C29 url('assets/splash.png') no-repeat center center / cover;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 99999;
      }
      .splash-spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #A24FFF;
        animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        box-shadow: 0 0 15px rgba(162, 79, 255, 0.5);
        /* Shifted down to avoid overlapping the centered logo in the splash screen background */
        margin-top: 250px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </app-root>
</body>

</html>
