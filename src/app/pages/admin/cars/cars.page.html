<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Fleet Management</ion-title>
    <ion-buttons slot="end">
      <ion-button class="button-round" color="primary" fill="solid">
        <ion-icon name="add-outline" slot="start"></ion-icon>
        Add New Car
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="roamie-card table-card animate-up">
    <div class="table-header">
      <div class="search-box">
        <ion-searchbar placeholder="Search fleet..." mode="ios"></ion-searchbar>
      </div>
      <div class="filters">
        <ion-select value="all" mode="ios">
          <ion-select-option value="all">All Status</ion-select-option>
          <ion-select-option value="available">Available</ion-select-option>
          <ion-select-option value="on-going">On-going</ion-select-option>
        </ion-select>
      </div>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Photo</th>
            <th>Brand & Model</th>
            <th>Plate</th>
            <th>Price/Day</th>
            <th>Type</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let car of cars">
            <td><img [src]="car.image" class="car-thumb"></td>
            <td>
              <div class="car-name">{{ car.brand }} {{ car.model }}</div>
              <div class="year">{{ car.year }}</div>
            </td>
            <td><span class="badge-plate">{{ car.plateNumber }}</span></td>
            <td>Rp {{ car.price | number }}</td>
            <td>{{ car.type }}</td>
            <td>
              <div class="status-badge" [class]="car.status.toLowerCase()">
                {{ car.status }}
              </div>
            </td>
            <td>
              <ion-button fill="clear" color="medium">
                <ion-icon name="create-outline" slot="icon-only"></ion-icon>
              </ion-button>
              <ion-button fill="clear" color="danger">
                <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
              </ion-button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</ion-content>
