<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>My Profile</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" color="danger">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="profile-header animate-up">
    <div class="avatar-container" (click)="openChangePhoto()" role="button" tabindex="0" aria-label="Change profile photo">
      <img [src]="user?.avatar" alt="">
      <div class="edit-badge" aria-hidden="true">
        <ion-icon name="camera"></ion-icon>
      </div>
    </div>
    <h2>{{ user?.name }}</h2>
    <p>{{ user?.email }}</p>
  </div>

  <div class="stats-grid animate-up">
    <div class="roamie-card stat-item">
      <span class="value">{{ totalRentals }}</span>
      <span class="label">Total Rentals</span>
    </div>
    <div class="roamie-card stat-item">
      <span class="value">{{ activeRentals }}</span>
      <span class="label">Active</span>
    </div>
  </div>

  <div class="actions-list animate-up">
    <ion-list lines="none">
      <ion-item button class="roamie-card" routerLink="/edit-profile">
        <ion-icon name="person-circle-outline" slot="start" color="primary"></ion-icon>
        <ion-label>Edit Profile</ion-label>
        <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
      </ion-item>
      <ion-item button class="roamie-card" routerLink="/notifications">
        <ion-icon name="notifications-outline" slot="start" color="secondary"></ion-icon>
        <ion-label>Notifications</ion-label>
        <ion-badge slot="end" color="danger" *ngIf="notificationCount > 0">{{ notificationCount }}</ion-badge>
        <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
      </ion-item>
      <ion-item button class="roamie-card" routerLink="/security">
        <ion-icon name="shield-outline" slot="start" color="tertiary"></ion-icon>
        <ion-label>Security</ion-label>
        <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
      </ion-item>
      <ion-item button class="roamie-card" routerLink="/help-center">
        <ion-icon name="help-circle-outline" slot="start" color="success"></ion-icon>
        <ion-label>Help Center</ion-label>
        <ion-icon name="chevron-forward" slot="end" color="medium"></ion-icon>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
